<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de IA: Optimización Lineal</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- PropTypes (Requerido por Recharts en entornos UMD) -->
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

    <!-- Recharts -->
    <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 selection:bg-blue-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { 
          XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, 
          Area, ComposedChart, Scatter, Cell, Line,
          Radar, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
          BarChart, Bar, Legend
        } = window.Recharts;

        // --- ICONOS COMPONENTIZADOS ---
        const Icon = ({ children, size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {children}
          </svg>
        );
        const Zap = (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
        const Calculator = (p) => <Icon {...p}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></Icon>;
        const Terminal = (p) => <Icon {...p}><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></Icon>;
        const Layers = (p) => <Icon {...p}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></Icon>;
        const Cpu = (p) => <Icon {...p}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></Icon>;
        const Code2 = (p) => <Icon {...p}><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></Icon>;
        const ArrowRight = (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>;
        const RotateCcw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
        const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
        const Play = (p) => <Icon {...p}><polygon points="5 3 19 12 5 21 5 3"/></Icon>;
        const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></Icon>;
        const Bot = (p) => <Icon {...p}><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></Icon>;
        const Loader2 = (p) => <Icon className={`animate-spin ${p.className || ''}`} {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
        const Network = (p) => <Icon {...p}><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></Icon>;


        // --- GEMINI API HELPER ---
        const callGeminiAPI = async (prompt) => {
          const apiKey = ""; // La API key se inyecta en el entorno si está disponible
          if(!apiKey) return "⚠️ Entorno sin API Key configurada para Gemini. Simulación: Esta sería una explicación generada por IA.";
          
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

          const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { 
              parts: [{ 
                text: "Eres un profesor asistente experto en Python, SciPy y Optimización Lineal. Tu objetivo es explicar líneas de código y conceptos matemáticos a estudiantes universitarios. Responde de forma MUY concisa (máximo 3 o 4 líneas breves), clara, técnica pero accesible, y directamente al punto. Evita introducciones largas." 
              }] 
            }
          };

          let retries = 5;
          let delay = 1000;
          
          while (retries > 0) {
            try {
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              if (!response.ok) throw new Error('Error en la API de Gemini');
              const data = await response.json();
              return data.candidates?.[0]?.content?.parts?.[0]?.text || "No se pudo generar una respuesta.";
            } catch (err) {
              retries--;
              if (retries === 0) return "⚠️ Lo siento, la API del Tutor IA no está disponible en este momento. Inténtalo más tarde.";
              await new Promise(r => setTimeout(r, delay));
              delay *= 2;
            }
          }
        };

        const App = () => {
          const [activeTab, setActiveTab] = useState('math');

          return (
            <div className="min-h-screen bg-slate-900 text-slate-200 font-sans selection:bg-blue-500/30">
              {/* Topbar Corporativo */}
              <div className="w-full bg-slate-950 border-b border-slate-800 px-6 py-4 flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/50">
                    <Zap className="text-white" size={20} />
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white tracking-tight">Laboratorio de IA: Fábrica de Pinturas</h1>
                    <p className="text-xs text-blue-400 uppercase tracking-widest font-semibold">Del Modelo al Código</p>
                  </div>
                </div>
                <div className="hidden lg:flex bg-slate-800 rounded-full p-1 border border-slate-700 overflow-x-auto">
                  <button onClick={() => setActiveTab('math')} className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition-all duration-300 whitespace-nowrap ${activeTab === 'math' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-700/50'}`}>
                    <Calculator size={16} /> 1. Modelo Base (2D)
                  </button>
                  <button onClick={() => setActiveTab('python')} className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition-all duration-300 whitespace-nowrap ${activeTab === 'python' ? 'bg-amber-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-700/50'}`}>
                    <Terminal size={16} /> 2. Código Python
                  </button>
                  <button onClick={() => setActiveTab('multi')} className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition-all duration-300 whitespace-nowrap ${activeTab === 'multi' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-700/50'}`}>
                    <Layers size={16} /> 3. Escala Multiproducto (5D+)
                  </button>
                  <button onClick={() => setActiveTab('multi_python')} className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition-all duration-300 whitespace-nowrap ${activeTab === 'multi_python' ? 'bg-purple-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-700/50'}`}>
                    <Cpu size={16} /> 4. Código Escala (5D)
                  </button>
                </div>
              </div>

              <main className="p-4 md:p-8 max-w-7xl mx-auto">
                <div className="mb-6">
                  <h2 className="text-3xl font-light text-white mb-2">
                    {activeTab === 'math' && 'Formulación del Problema Clásico'}
                    {activeTab === 'python' && 'Resolución Computacional'}
                    {activeTab === 'multi' && 'Ampliación del Modelo: Producción Multiproducto'}
                    {activeTab === 'multi_python' && 'La Magia de las Matrices: Código N-Dimensional'}
                  </h2>
                  <p className="text-slate-400 max-w-3xl leading-relaxed">
                    {activeTab === 'math' && 'Traducción de las reglas de negocio (materias primas y demanda) a un sistema de inecuaciones que definen la región factible.'}
                    {activeTab === 'python' && 'Construcción de las matrices del problema y ejecución del solver de grado industrial de SciPy para hallar el vértice óptimo.'}
                    {activeTab === 'multi' && 'Cuando pasamos a n dimensiones, el problema es imposible de graficar geométricamente. Entendamos cómo lo escala y visualiza la IA.'}
                    {activeTab === 'multi_python' && 'Aquí está la clave de usar Python y SciPy: el código sigue siendo exactamente el mismo. Solo cambian las dimensiones de las matrices.'}
                  </p>
                </div>

                <div className="bg-slate-800/50 border border-slate-700 rounded-2xl overflow-hidden shadow-2xl backdrop-blur-sm">
                  {activeTab === 'math' && <MathModelingView />}
                  {activeTab === 'python' && <PythonImplementationView />}
                  {activeTab === 'multi' && <MultiProductView />}
                  {activeTab === 'multi_python' && <MultiPythonImplementationView />}
                </div>
              </main>
            </div>
          );
        };

        // --- VISTA 1: MODELADO MATEMÁTICO (2D) ---
        const MathModelingView = () => {
          const chartData = useMemo(() => {
            const points = [];
            for (let x1 = 0; x1 <= 6; x1 += 0.2) {
              const c1 = (24 - 6 * x1) / 4;
              const c2 = (6 - x1) / 2;
              const c3 = 2;
              const c4 = 1 + x1;
              const y = Math.max(0, Math.min(c1, c2, c3, c4));
              points.push({ x: x1, y: y });
            }
            return points;
          }, []);

          const optimalPoint = { x: 3, y: 1.5, z: 21 };

          return (
            <div className="grid lg:grid-cols-12 gap-0 min-h-[600px]">
              <div className="lg:col-span-5 border-r border-slate-700 bg-slate-900/50 p-8 flex flex-col">
                <div className="mb-6">
                  <h3 className="text-blue-400 font-bold uppercase tracking-wider text-sm mb-4">Función Objetivo</h3>
                  <div className="bg-slate-950 border border-slate-800 rounded-xl p-4 text-center">
                    <span className="text-slate-400 text-sm">Maximizar Beneficio</span>
                    <div className="text-2xl font-mono text-white mt-1">
                      Z = <span className="text-blue-400">5</span>x₁ + <span className="text-blue-400">4</span>x₂
                    </div>
                  </div>
                </div>

                <div className="flex-1">
                  <h3 className="text-blue-400 font-bold uppercase tracking-wider text-sm mb-4">Restricciones Lineales</h3>
                  <div className="space-y-3 font-mono text-sm">
                    <div className="bg-slate-800/80 border border-slate-700 p-3 rounded-lg flex justify-between">
                      <span className="text-slate-300">Materia Prima 1:</span>
                      <span className="text-amber-400 font-bold">6x₁ + 4x₂ ≤ 24</span>
                    </div>
                    <div className="bg-slate-800/80 border border-slate-700 p-3 rounded-lg flex justify-between">
                      <span className="text-slate-300">Materia Prima 2:</span>
                      <span className="text-amber-400 font-bold">x₁ + 2x₂ ≤ 6</span>
                    </div>
                    <div className="bg-slate-800/80 border border-slate-700 p-3 rounded-lg flex justify-between">
                      <span className="text-slate-300">Demanda Max x₂:</span>
                      <span className="text-emerald-400 font-bold">x₂ ≤ 2</span>
                    </div>
                    <div className="bg-slate-800/80 border border-slate-700 p-3 rounded-lg flex justify-between">
                      <span className="text-slate-300">Límite Mercado:</span>
                      <span className="text-emerald-400 font-bold">-x₁ + x₂ ≤ 1</span>
                    </div>
                    <div className="bg-slate-900 border border-slate-800 p-3 rounded-lg text-center mt-4 text-slate-500">
                      x₁, x₂ ≥ 0 (No negatividad)
                    </div>
                  </div>
                </div>
              </div>

              <div className="lg:col-span-7 p-8 relative flex flex-col">
                <h3 className="text-lg font-semibold text-slate-200 mb-4">Gráfica de la Región Factible (2D)</h3>
                <div className="flex-1 w-full bg-slate-900/30 rounded-2xl border border-slate-800 p-4">
                  <ResponsiveContainer width="100%" height="100%">
                    <ComposedChart data={chartData} margin={{ top: 20, right: 30, left: 0, bottom: 20 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#334155" vertical={false} />
                      <XAxis dataKey="x" type="number" domain={[0, 5]} stroke="#64748b" label={{ value: 'Pintura Exterior (x₁)', position: 'insideBottom', offset: -15, fill: '#94a3b8' }} />
                      <YAxis type="number" domain={[0, 4]} stroke="#64748b" label={{ value: 'Pintura Interior (x₂)', angle: -90, position: 'insideLeft', offset: 10, fill: '#94a3b8' }} />
                      
                      <Area type="monotone" dataKey="y" stroke="#3b82f6" strokeWidth={2} fill="url(#colorUv)" fillOpacity={1} />
                      <defs>
                        <linearGradient id="colorUv" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.4}/>
                          <stop offset="95%" stopColor="#3b82f6" stopOpacity={0.1}/>
                        </linearGradient>
                      </defs>
                      
                      <Scatter data={[{x: optimalPoint.x, y: optimalPoint.y}]} fill="#f59e0b">
                        <Cell stroke="#fef3c7" strokeWidth={3} />
                      </Scatter>
                    </ComposedChart>
                  </ResponsiveContainer>
                  
                  <div className="absolute transform -translate-x-1/2 -translate-y-full bg-amber-500 text-slate-900 text-xs font-bold px-3 py-1 rounded shadow-lg"
                       style={{ left: `calc(35px + ${(optimalPoint.x / 5) * (100 - 35 - 30)}%)`, bottom: `calc(35px + ${(optimalPoint.y / 4) * (100 - 20 - 20)}%)` }}>
                    Óptimo: ({optimalPoint.x}, {optimalPoint.y}) Z={optimalPoint.z}
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // --- VISTA 2: IMPLEMENTACIÓN PYTHON ---
        const PythonImplementationView = () => {
          const [step, setStep] = useState(0);
          const [aiResponse, setAiResponse] = useState("");
          const [isAiLoading, setIsAiLoading] = useState(false);

          useEffect(() => { setAiResponse(""); }, [step]);

          const stepsInfo = [
            { title: "1. Importar Librería", desc: "SciPy contiene las rutinas matemáticas para optimización en Python.", lines: [0, 1] },
            { title: "2. Vector de Costes (c)", desc: "SciPy por defecto minimiza. Como queremos MAXIMIZAR Z = 5x1 + 4x2, invertimos los signos de los coeficientes.", lines: [3, 4] },
            { title: "3. Matriz de Coeficientes (A_ub)", desc: "Lado izquierdo de las inecuaciones. Cada fila es una restricción (M1, M2, Demanda x2, Mercado).", lines: [6, 7] },
            { title: "4. Vector de Límites (b_ub)", desc: "Lado derecho de las inecuaciones. Son los límites máximos disponibles (<=).", lines: [9, 10] },
            { title: "5. Ejecutar el Solver", desc: "Llamamos a linprog. El motor 'highs' es el estándar moderno en SciPy. Los límites x>=0 vienen por defecto.", lines: [12, 13] },
            { title: "6. Resultados", desc: "Extraemos el beneficio (volviendo a invertir el signo) y los valores óptimos del array de solución x.", lines: [15, 16, 17] }
          ];

          const pythonCode = `from scipy.optimize import linprog

# 1. Función Objetivo (Invertida para maximizar)
c = [-5, -4]

# 2. Coeficientes de restricciones (Lado izquierdo)
A = [[6, 4], [1, 2], [0, 1], [-1, 1]]

# 3. Límites de restricciones (Lado derecho)
b = [24, 6, 2, 1]

# 4. Ejecutar el solver
res = linprog(c, A_ub=A, b_ub=b, method='highs')

print(f'Beneficio Máximo: {-res.fun}')
print(f'Pintura Exterior (x1): {res.x[0]}')
print(f'Pintura Interior (x2): {res.x[1]}')`;

          const codeLines = pythonCode.split('\n');

          const handleAskGemini = async () => {
            setIsAiLoading(true);
            let prompt = "";
            switch(step) {
              case 0: prompt = "¿Qué es SciPy y por qué es el estándar en Python para cálculos científicos y de IA en lugar de programar los algoritmos desde cero?"; break;
              case 1: prompt = "Explica por qué en la función linprog de SciPy, si nuestra función es maximizar Z = 5x1 + 4x2, debemos definir el vector de costes como c = [-5, -4]."; break;
              case 2: prompt = "En nuestra matriz A = [[6, 4], [1, 2], [0, 1], [-1, 1]], ¿qué representan exactamente los números de la última fila [-1, 1] en el contexto de nuestra fábrica?"; break;
              case 3: prompt = "Explica la relación matemática entre la matriz A y el vector b = [24, 6, 2, 1] (Ax <= b) en programación lineal."; break;
              case 4: prompt = "¿Qué es el método 'highs' dentro de scipy.optimize.linprog y por qué es mejor que el antiguo método Simplex por defecto?"; break;
              case 5: prompt = "El solver devuelve un objeto 'res'. Explica por qué para imprimir el beneficio máximo tenemos que poner un signo negativo a '-res.fun'."; break;
              default: prompt = "Resume en 2 líneas el proceso de resolver un problema de optimización en Python.";
            }
            const response = await callGeminiAPI(prompt);
            setAiResponse(response);
            setIsAiLoading(false);
          };

          return (
            <div className="grid lg:grid-cols-12 gap-0 min-h-[600px]">
              <div className="lg:col-span-6 border-r border-slate-700 bg-slate-950 flex flex-col">
                <div className="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
                  <div className="flex items-center gap-2 text-amber-500 font-mono text-sm font-bold"><Code2 size={18} /> solver_fabrica_2d.py</div>
                  <div className="flex gap-1 text-slate-600"><div className="w-3 h-3 rounded-full bg-slate-700"></div><div className="w-3 h-3 rounded-full bg-slate-700"></div><div className="w-3 h-3 rounded-full bg-slate-700"></div></div>
                </div>
                
                <div className="p-6 font-mono text-sm leading-relaxed overflow-y-auto flex-1 bg-[#0d1117]">
                  {codeLines.map((line, index) => {
                    const isActive = stepsInfo[step].lines.includes(index);
                    const isComment = line.trim().startsWith('#');
                    return (
                      <div key={index} className={`px-2 py-0.5 rounded transition-colors duration-300 flex ${isActive ? 'bg-amber-500/20 border-l-2 border-amber-500' : 'border-l-2 border-transparent opacity-60'}`}>
                        <span className="w-8 inline-block text-slate-600 select-none text-right mr-4">{index + 1}</span>
                        <span className={`${isComment ? 'text-slate-500' : isActive ? 'text-amber-300' : 'text-slate-300'}`}>{line}</span>
                      </div>
                    );
                  })}
                </div>

                <div className="p-6 bg-slate-900 border-t border-slate-800">
                  <div className="flex justify-between items-end mb-4">
                    <div>
                      <h4 className="text-amber-500 font-bold mb-1">{stepsInfo[step].title}</h4>
                      <p className="text-slate-400 text-sm max-w-md">{stepsInfo[step].desc}</p>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={() => setStep(Math.max(0, step - 1))} disabled={step === 0} className="p-2 bg-slate-800 rounded hover:bg-slate-700 disabled:opacity-50"><RotateCcw size={18} className="text-slate-400" /></button>
                      <button onClick={() => setStep(Math.min(stepsInfo.length - 1, step + 1))} disabled={step === stepsInfo.length - 1} className="px-4 py-2 bg-amber-600 text-white font-bold rounded hover:bg-amber-500 disabled:opacity-50 flex items-center gap-2">Siguiente <ArrowRight size={16} /></button>
                    </div>
                  </div>
                </div>
              </div>

              <div className="lg:col-span-6 flex flex-col bg-slate-900/50">
                <div className="p-6 md:p-8 flex-1 flex flex-col justify-center">
                  {step === 1 && (
                     <div className="animate-fade-in bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-xl max-w-sm mx-auto w-full">
                       <h4 className="text-center text-slate-400 text-xs font-bold uppercase tracking-wider mb-4">Vector de Costes</h4>
                       <div className="flex justify-center items-center text-2xl font-mono text-white">c = [ <span className="text-amber-400 mx-2">-5</span>, <span className="text-amber-400 mx-2">-4</span> ]</div>
                       <div className="mt-4 text-center text-xs text-slate-500">Representa la función: -5x₁ - 4x₂</div>
                     </div>
                  )}
                  {(step === 2 || step === 3) && (
                     <div className="animate-fade-in flex flex-col items-center">
                       <h4 className="text-center text-slate-400 text-xs font-bold uppercase tracking-wider mb-4">Sistema Matricial A·x ≤ b</h4>
                       <div className="flex items-center gap-4 text-xl font-mono text-white">

                  <section className="bg-slate-800/40 p-5 rounded-xl border border-slate-700">

                      <span className="text-amber-400 text-xl leading-none align-middle">∑</span> (aᵢⱼ · xⱼ) ≤ bᵢ <span className="text-xs text-slate-500 ml-2">para cada i = 1, ..., m</span>
                    </div>

              </div>

              <div className="lg:col-span-6 p-6 md:p-8 flex flex-col bg-slate-900/30">
                <div className="mb-4">

# 1. Función Objetivo (5 productos)
c = [-50, -40, -80, -50, -30]

# 2. Matriz A: 4 Recursos x 5 Productos
A = [
    [2, 1, 3, 2, 1],  # Mat. Prima 1
    [1, 2, 1, 1, 0],  # Mat. Prima 2
    [0, 0, 4, 1, 2],  # Resinas
    [3, 2, 5, 2, 1]   # Horas Máquina
]

# 3. Límites de recursos (Lado derecho)
b = [100, 80, 150, 200]

# 4. El código del solver NO CAMBIA
res = linprog(c, A_ub=A, b_ub=b, method='highs')

print(f'Beneficio Máximo: {-res.fun}')
# res.x es un array NumPy con 5 valores
print(f'Producción Óptima: {res.x}')`;

                <div className="p-6 font-mono text-sm leading-relaxed overflow-y-auto flex-1 bg-[#0d1117]">

                           <div className="text-purple-400 text-right">100</div>
                           <div className="text-purple-400 text-right">80</div>
                           <div className="text-purple-400 text-right">150</div>
                           <div className="text-purple-400 text-right">200</div>
                         </div>
                       </div>
                       <div className="mt-4 text-center text-xs text-slate-400 max-w-sm">
                          Ahora tenemos 4 filas (recursos limitados) y 5 columnas (tipos de pintura a fabricar).
                       </div>
                     </div>
                  )}

                  {step >= 3 && (
                     <div className="animate-fade-in w-full max-w-md mx-auto bg-black rounded-lg border border-slate-700 shadow-2xl overflow-hidden font-mono text-sm">
                        <div className="bg-slate-800 px-4 py-2 flex items-center gap-2 text-slate-400 border-b border-slate-700"><Terminal size={14} /> Output Terminal</div>
                        <div className="p-4 text-slate-300 min-h-[150px]">
                          {step === 3 && <div className="flex items-center gap-2 text-purple-400 mb-4 animate-pulse"><Play size={14} /> Resolviendo n-dimensiones...</div>}
                          {step >= 4 && (
                            <div className="animate-fade-in space-y-2">
                              <div className="text-emerald-400 flex items-center gap-2"><CheckCircle2 size={14} /> Optimización completada</div>
                              <div>Beneficio Máximo: <span className="text-white font-bold">12450.0</span></div>
                              <div className="mt-2 text-slate-400"># [ x1, x2, x3, x4, x5 ]</div>
                              <div>Producción Óptima: <span className="text-white font-bold">[ 45.  10.  80.  50.  30. ]</span></div>

                <div className="p-6 border-t border-slate-800 bg-indigo-950/20">
                  {!aiResponse ? (
                     <button onClick={handleAskGemini} disabled={isAiLoading} className="w-full py-3 px-4 bg-indigo-900/40 hover:bg-indigo-800/50 text-indigo-300 border border-indigo-700/50 rounded-xl text-sm font-medium transition-all flex items-center justify-center gap-2 disabled:opacity-50">
                        {isAiLoading ? <Loader2 size={16} className="animate-spin" /> : <Sparkles size={16} className="text-indigo-400" />}
                        ✨ Pedir a Gemini que explique esta abstracción
                     </button>
                  ) : (
                    <div className="bg-indigo-950/60 border border-indigo-800 rounded-xl p-4 relative animate-fade-in">
                      <div className="absolute -top-3 left-4 bg-slate-900 text-indigo-400 text-[10px] font-bold uppercase px-2 py-0.5 rounded-full border border-indigo-800 flex items-center gap-1"><Bot size={12} /> Explicación IA (Gemini)</div>
                      <p className="text-sm text-indigo-100 leading-relaxed mt-1">{aiResponse}</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
