<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSO Master - Simulador de Infraestructuras</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecutar JSX en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; font-weight: 700; }
        input[type=range] { cursor: pointer; }
        .transition-all { transition: all 0.5s ease; }
        /* Estilos para forzar la negrita y legibilidad en la telemetría */
        .table-bold td, .table-bold th { font-weight: 800 !important; }
        .bg-grid {
            background-size: 25px 25px;
            background-image: radial-gradient(circle, currentColor 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-slate-50 transition-colors duration-500" id="body-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Componente de Icono compatible con Lucide en modo Standalone
        const Icon = ({ name, size = 18, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const MAP_SIZE = 550; // Mapa grande para el layout 50/50
            const TARGET = { x: 450, y: 100 };
            const NUM_DRONES = 8;

            const [w, setW] = useState(0.5);   
            const [c1, setC1] = useState(1.5); 
            const [c2, setC2] = useState(1.5); 

            const [iteration, setIteration] = useState(0);
            const [drones, setDrones] = useState([]);
            const [gBest, setGBest] = useState({ x: 0, y: 0, fitness: Infinity });
            const [status, setStatus] = useState("Sistemas listos.");
            const [presentationMode, setPresentationMode] = useState(false);

            // Actualizar iconos de Lucide en cada renderizado
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            // Función para calcular la proyección del siguiente movimiento
            const calculateProjection = useCallback((d, currentGBest) => {
                const r1 = 0.5; // Valor estático para previsualización suave
                const r2 = 0.5;
                const vInertiaX = w * d.vx;
                const vInertiaY = w * d.vy;
                const vCogX = c1 * r1 * (d.pBestX - d.x);
                const vCogY = c1 * r1 * (d.pBestY - d.y);
                const vSocX = c2 * r2 * (currentGBest.x - d.x);
                const vSocY = c2 * r2 * (currentGBest.y - d.y);

                const nVx = vInertiaX + vCogX + vSocX;
                const nVy = vInertiaY + vCogY + vSocY;

                const magInertia = Math.sqrt(vInertiaX**2 + vInertiaY**2);
                const magCog = Math.sqrt(vCogX**2 + vCogY**2);
                const magSoc = Math.sqrt(vSocX**2 + vSocY**2);

                let reason = "Equil.";
                if (magInertia > magCog && magInertia > magSoc) reason = "Inercia";
                else if (magCog > magInertia && magCog > magSoc) reason = "Memoria";
                else if (magSoc > magInertia && magSoc > magCog) reason = "Social";

                let nX = Math.max(0, Math.min(MAP_SIZE, d.x + nVx));
                let nY = Math.max(0, Math.min(MAP_SIZE, d.y + nVy));
                return { nX, nY, nVx, nVy, reason };
            }, [w, c1, c2, MAP_SIZE]);

            const initMission = useCallback(() => {
                const newDrones = Array.from({ length: NUM_DRONES }, (_, i) => {
                    const x = Math.random() * MAP_SIZE;
                    const y = Math.random() * MAP_SIZE;
                    const vx = (Math.random() - 0.5) * 15;
                    const vy = (Math.random() - 0.5) * 15;
                    const fitness = Math.sqrt(Math.pow(x - TARGET.x, 2) + Math.pow(y - TARGET.y, 2));
                    return {
                        id: i, x, y, vx, vy, pBestX: x, pBestY: y, pBestFitness: fitness,
                        color: `hsl(${(i * 360) / NUM_DRONES}, 85%, 50%)`,
                        nextX: x, nextY: y, reason: "Explor."
                    };
                });
                let best = { ...newDrones[0], fitness: newDrones[0].pBestFitness };
                newDrones.forEach(d => { if (d.pBestFitness < best.fitness) best = { x: d.x, y: d.y, fitness: d.pBestFitness }; });
                
                const withProj = newDrones.map(d => {
                    const proj = calculateProjection(d, best);
                    return { ...d, nextX: proj.nX, nextY: proj.nY, reason: proj.reason };
                });
                
                setDrones(withProj);
                setGBest(best);
                setIteration(0);
                setStatus("Drones en posición.");
            }, [calculateProjection, MAP_SIZE, TARGET.x, TARGET.y]);

            useEffect(() => { initMission(); }, []);

            const runStep = () => {
                setDrones(prev => {
                    const nextDrones = prev.map(d => {
                        const r1 = Math.random();
                        const r2 = Math.random();
                        const vX = w * d.vx + c1 * r1 * (d.pBestX - d.x) + c2 * r2 * (gBest.x - d.x);
                        const vY = w * d.vy + c1 * r1 * (d.pBestY - d.y) + c2 * r2 * (gBest.y - d.y);
                        const nextX = Math.max(0, Math.min(MAP_SIZE, d.x + vX));
                        const nextY = Math.max(0, Math.min(MAP_SIZE, d.y + vY));
                        const fitness = Math.sqrt(Math.pow(nextX - TARGET.x, 2) + Math.pow(nextY - TARGET.y, 2));
                        const isNewPBest = fitness < d.pBestFitness;
                        return {
                            ...d, x: nextX, y: nextY, vx: vX, vy: vY,
                            pBestX: isNewPBest ? nextX : d.pBestX,
                            pBestY: isNewPBest ? nextY : d.pBestY,
                            pBestFitness: isNewPBest ? fitness : d.pBestFitness
                        };
                    });
                    let best = { ...gBest };
                    nextDrones.forEach(d => { if (d.pBestFitness < best.fitness) best = { x: d.pBestX, y: d.pBestY, fitness: d.pBestFitness }; });
                    setGBest(best);
                    setIteration(i => i + 1);
                    setStatus(best.fitness < 20 ? "Localizado." : "Calculando...");
                    return nextDrones.map(d => {
                        const proj = calculateProjection(d, best);
                        return { ...d, nextX: proj.nX, nextY: proj.nY, reason: proj.reason };
                    });
                });
            };

            return (
                <div className={`min-h-screen ${presentationMode ? 'bg-slate-950 text-white' : 'bg-slate-50 text-slate-800'} p-4 md:p-6 transition-all`}>
                    <div className="max-w-[1700px] mx-auto">
                        
                        {/* Cabecera */}
                        <div className={`flex flex-col md:flex-row justify-between items-center mb-8 border-b pb-4 ${presentationMode ? 'border-white/10' : 'border-slate-200'}`}>
                            <div>
                                <h1 className="text-4xl font-black flex items-center gap-3">
                                    <Icon name="navigation" size={32} className="text-blue-600" />
                                    <span className={presentationMode ? "text-white" : "text-slate-900"}><span className="text-blue-600">PSO</span> Master AI</span>
                                </h1>
                                <p className="opacity-70 text-xs font-black uppercase tracking-[0.2em] mt-1 text-blue-500">Master Gestión de Infraestructuras</p>
                            </div>
                            <div className="flex gap-4 items-center mt-4 md:mt-0">
                                <button onClick={() => setPresentationMode(!presentationMode)} className={`px-5 py-2.5 rounded-xl text-xs font-black transition flex items-center gap-2 ${presentationMode ? 'bg-white/10 text-white' : 'bg-slate-200 text-slate-700'}`}>
                                    <Icon name={presentationMode ? "sun" : "moon"} size={16} />
                                    {presentationMode ? 'MODO LUZ' : 'MODO NOCHE'}
                                </button>
                                <button onClick={initMission} className={`p-3 rounded-xl transition ${presentationMode ? 'bg-white/5 border border-white/10 text-white' : 'bg-white border border-slate-200 text-slate-600'}`}>
                                    <Icon name="refresh-cw" size={20} />
                                </button>
                                <button onClick={runStep} className="bg-blue-600 text-white px-10 py-3.5 rounded-xl font-black shadow-2xl hover:scale-105 active:scale-95 transition flex items-center gap-3 text-base">
                                    EJECUTAR PASO ({iteration})
                                    <Icon name="chevron-right" size={22} />
                                </button>
                            </div>
                        </div>

                        {/* Layout 50/50 Optimizado */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 items-stretch">
                            
                            {/* COLUMNA IZQUIERDA: GRÁFICOS */}
                            <div className={`${presentationMode ? 'bg-slate-900 border-white/10' : 'bg-white border-slate-200'} p-8 rounded-[2.5rem] border shadow-2xl flex flex-col items-center justify-center transition-all min-h-[700px]`}>
                                <div className="relative" style={{ width: MAP_SIZE, height: MAP_SIZE }}>
                                    <div className={`absolute inset-0 rounded-3xl bg-grid ${presentationMode ? 'bg-slate-950 text-white/5' : 'bg-slate-50 text-slate-200'}`}></div>
                                    
                                    {/* Punto Objetivo (Invisible al inicio, rastro térmico) */}
                                    <div className="absolute w-20 h-20 bg-orange-500/10 rounded-full animate-ping" style={{ left: TARGET.x-40, top: TARGET.y-40 }}></div>
                                    <div className="absolute text-orange-500" style={{ left: TARGET.x-20, top: TARGET.y-20 }}><Icon name="flame" size={40} /></div>
                                    
                                    <svg className="absolute inset-0 w-full h-full pointer-events-none overflow-visible">
                                        {drones.map(d => (
                                            <React.Fragment key={d.id}>
                                                <line x1={d.x} y1={d.y} x2={gBest.x} y2={gBest.y} stroke={presentationMode ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.04)"} strokeWidth="2" />
                                                <line x1={d.x} y1={d.y} x2={d.nextX} y2={d.nextY} stroke={presentationMode ? "rgba(255,255,255,0.4)" : "rgba(50,50,50,0.4)"} strokeWidth="3" strokeDasharray="8" />
                                            </React.Fragment>
                                        ))}
                                    </svg>

                                    {/* Drones */}
                                    {drones.map(d => (
                                        <div key={d.id} className="absolute w-8 h-8 rounded-full border-[3px] border-white shadow-2xl flex items-center justify-center transition-all duration-500"
                                            style={{ left: d.x, top: d.y, backgroundColor: d.color, transform: 'translate(-50%, -50%)', zIndex: 10 }}>
                                            <span className="text-[11px] font-black text-white">{d.id}</span>
                                        </div>
                                    ))}
                                    
                                    {/* Global Best Marker */}
                                    <div className="absolute w-14 h-14 border-[5px] border-emerald-500/40 rounded-full flex items-center justify-center animate-pulse" style={{ left: gBest.x-28, top: gBest.y-28 }}>
                                        <Icon name="target" size={28} className="text-emerald-500" />
                                    </div>
                                </div>
                                
                                <div className="mt-12 flex items-center gap-10">
                                    <div className="text-center">
                                        <div className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Mejor Fitness</div>
                                        <div className="text-3xl font-black text-blue-500 font-mono">{gBest.fitness.toFixed(4)}</div>
                                    </div>
                                    <div className={`px-6 py-3 rounded-2xl border font-black text-sm ${presentationMode ? 'bg-white/5 border-white/10' : 'bg-slate-100 border-slate-200'}`}>
                                        <Icon name="info" size={14} className="inline mr-2" /> {status.toUpperCase()}
                                    </div>
                                </div>
                            </div>

                            {/* COLUMNA DERECHA: DATOS */}
                            <div className="flex flex-col gap-6">
                                
                                {/* HIPERPARÁMETROS */}
                                <div className={`p-8 rounded-[2.5rem] shadow-xl border ${presentationMode ? 'bg-slate-800 border-white/10 text-white' : 'bg-white border-slate-200 text-slate-800'}`}>
                                    <h2 className="text-[16px] font-black uppercase tracking-tighter text-slate-400 mb-6 flex items-center gap-3">
                                        <Icon name="settings-2" size={20} /> Ajuste de Hiperparámetros
                                    </h2>
                                    <div className="grid grid-cols-1 gap-4">
                                        {[
                                            { id: 'w', val: w, set: setW, label: 'Inercia (w)', color: 'blue', icon: "wind", desc: 'Mantiene dirección previa.' },
                                            { id: 'c1', val: c1, set: setC1, label: 'Cognitivo (c1)', color: 'emerald', icon: "brain", desc: 'Atracción a récord propio.' },
                                            { id: 'c2', val: c2, set: setC2, label: 'Social (c2)', color: 'purple', icon: "users", desc: 'Atracción al líder grupal.' }
                                        ].map(p => (
                                            <div key={p.id} className="bg-slate-50 dark:bg-slate-900/40 p-4 rounded-2xl border dark:border-white/5">
                                                <div className="flex justify-between font-black text-lg mb-2 uppercase">
                                                    <span className="flex items-center gap-3"><Icon name={p.icon} size={20} className={`text-${p.color}-500`} /> {p.label}</span>
                                                    <span className={`text-${p.color}-500 font-mono text-3xl`}>{p.val.toFixed(2)}</span>
                                                </div>
                                                <input type="range" min="0" max="2" step="0.1" value={p.val} onChange={(e) => p.set(parseFloat(e.target.value))} className="w-full h-3 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
                                                <p className="text-xs opacity-60 mt-2 font-bold italic">{p.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* TELEMETRÍA */}
                                <div className={`${presentationMode ? 'bg-slate-800 border-white/10' : 'bg-white border-slate-200'} rounded-[2.5rem] border shadow-xl overflow-hidden flex-1`}>
                                    <div className="bg-slate-100 dark:bg-slate-900/50 px-8 py-4 border-b dark:border-white/10 flex justify-between items-center">
                                        <h3 className="text-sm font-black uppercase tracking-widest flex items-center gap-3">
                                            <Icon name="table" size={20} className="text-blue-500" /> Telemetría Predictiva
                                        </h3>
                                        <span className="text-[10px] font-black opacity-40">DATOS EN TIEMPO REAL</span>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-[12px] font-mono leading-none border-collapse table-bold">
                                            <thead className={`${presentationMode ? 'text-slate-500' : 'text-slate-400'} uppercase border-b ${presentationMode ? 'border-white/5' : 'border-slate-100'}`}>
                                                <tr>
                                                    <th className="px-6 py-4">ID</th>
                                                    <th className="px-6 py-4">Lógica</th>
                                                    <th className="px-6 py-4">pBest</th>
                                                    <th className="px-6 py-4 bg-blue-50/50 dark:bg-blue-900/20 text-blue-600">Próx. Punto</th>
                                                    <th className="px-6 py-4 text-right">Fitness</th>
                                                </tr>
                                            </thead>
                                            <tbody className={`divide-y ${presentationMode ? 'divide-white/5' : 'divide-slate-50'}`}>
                                                {drones.map(d => (
                                                    <tr key={d.id} className={`${presentationMode ? 'hover:bg-white/5' : 'hover:bg-slate-50'} transition-colors`}>
                                                        <td className="px-6 py-3 flex items-center gap-3 font-black">
                                                            <div className="w-4 h-4 rounded-full border-2 border-white shadow-sm" style={{ backgroundColor: d.color }}></div>
                                                            D{d.id}
                                                        </td>
                                                        <td className="px-6 py-3">
                                                            <span className={`px-2.5 py-1 rounded-lg text-[10px] font-black ${
                                                                d.reason === 'Inercia' ? 'bg-blue-100 text-blue-700' :
                                                                d.reason === 'Memoria' ? 'bg-emerald-100 text-emerald-700' :
                                                                d.reason === 'Social' ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-500'
                                                            }`}>
                                                                {d.reason.toUpperCase()}
                                                            </span>
                                                        </td>
                                                        <td className="px-6 py-3 opacity-100 italic">{d.pBestX.toFixed(0)},{d.pBestY.toFixed(0)}</td>
                                                        <td className={`px-6 py-3 text-sm ${presentationMode ? 'text-blue-300' : 'text-blue-700'}`}>
                                                            → {d.nextX.toFixed(0)},{d.nextY.toFixed(0)}
                                                        </td>
                                                        <td className="px-6 py-3 text-right text-base">{d.pBestFitness.toFixed(1)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
