<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSO Master - Simulador de Infraestructuras</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecutar JSX en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        input[type=range] { cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50 transition-colors duration-500" id="body-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- COMPONENTES DE ICONOS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const MAP_SIZE = 400;
            const TARGET = { x: 320, y: 80 };
            const NUM_DRONES = 8;

            const [w, setW] = useState(0.5);   
            const [c1, setC1] = useState(1.5); 
            const [c2, setC2] = useState(1.5); 

            const [iteration, setIteration] = useState(0);
            const [drones, setDrones] = useState([]);
            const [gBest, setGBest] = useState({ x: 0, y: 0, fitness: Infinity });
            const [status, setStatus] = useState("Esperando despegue...");
            const [presentationMode, setPresentationMode] = useState(false);

            // Asegurar que los iconos de Lucide se rendericen después de cada cambio en el DOM
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [iteration, drones, presentationMode]);

            const calculateProjection = useCallback((d, currentGBest) => {
                const r1 = 0.5; 
                const r2 = 0.5;
                const nVx = w * d.vx + c1 * r1 * (d.pBestX - d.x) + c2 * r2 * (currentGBest.x - d.x);
                const nVy = w * d.vy + c1 * r1 * (d.pBestY - d.y) + c2 * r2 * (currentGBest.y - d.y);
                let nX = Math.max(0, Math.min(MAP_SIZE, d.x + nVx));
                let nY = Math.max(0, Math.min(MAP_SIZE, d.y + nVy));
                return { nX, nY, nVx, nVy };
            }, [w, c1, c2, MAP_SIZE]);

            const initMission = useCallback(() => {
                const newDrones = Array.from({ length: NUM_DRONES }, (_, i) => {
                    const x = Math.random() * MAP_SIZE;
                    const y = Math.random() * MAP_SIZE;
                    const vx = (Math.random() - 0.5) * 10;
                    const vy = (Math.random() - 0.5) * 10;
                    const fitness = Math.sqrt(Math.pow(x - TARGET.x, 2) + Math.pow(y - TARGET.y, 2));
                    return {
                        id: i, x, y, vx, vy, pBestX: x, pBestY: y, pBestFitness: fitness,
                        color: `hsl(${(i * 360) / NUM_DRONES}, 70%, 50%)`,
                        nextX: x, nextY: y
                    };
                });
                let best = { ...newDrones[0], fitness: newDrones[0].pBestFitness };
                newDrones.forEach(d => { if (d.pBestFitness < best.fitness) best = { x: d.x, y: d.y, fitness: d.pBestFitness }; });
                const withProj = newDrones.map(d => ({ ...d, ...calculateProjection(d, best) }));
                setDrones(withProj);
                setGBest(best);
                setIteration(0);
                setStatus("Drones desplegados aleatoriamente.");
            }, [calculateProjection, MAP_SIZE, TARGET.x, TARGET.y]);

            useEffect(() => { initMission(); }, []);

            const runStep = () => {
                setDrones(prev => {
                    const nextDrones = prev.map(d => {
                        const r1 = Math.random();
                        const r2 = Math.random();
                        const vX = w * d.vx + c1 * r1 * (d.pBestX - d.x) + c2 * r2 * (gBest.x - d.x);
                        const vY = w * d.vy + c1 * r1 * (d.pBestY - d.y) + c2 * r2 * (gBest.y - d.y);
                        const nextX = Math.max(0, Math.min(MAP_SIZE, d.x + vX));
                        const nextY = Math.max(0, Math.min(MAP_SIZE, d.y + vY));
                        const fitness = Math.sqrt(Math.pow(nextX - TARGET.x, 2) + Math.pow(nextY - TARGET.y, 2));
                        const isNewPBest = fitness < d.pBestFitness;
                        return {
                            ...d, x: nextX, y: nextY, vx: vX, vy: vY,
                            pBestX: isNewPBest ? nextX : d.pBestX,
                            pBestY: isNewPBest ? nextY : d.pBestY,
                            pBestFitness: isNewPBest ? fitness : d.pBestFitness
                        };
                    });
                    let best = { ...gBest };
                    nextDrones.forEach(d => { if (d.pBestFitness < best.fitness) best = { x: d.pBestX, y: d.pBestY, fitness: d.pBestFitness }; });
                    setGBest(best);
                    setIteration(i => i + 1);
                    setStatus(best.fitness < 20 ? "Convergencia final alcanzada." : "Buscando rastro térmico...");
                    return nextDrones.map(d => {
                        const proj = calculateProjection(d, best);
                        return { ...d, nextX: proj.nX, nextY: proj.nY };
                    });
                });
            };

            return (
                <div className={`min-h-screen ${presentationMode ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-800'} p-4 md:p-10 transition-all duration-500`}>
                    <div className="max-w-6xl mx-auto">
                        <div className={`flex flex-col md:flex-row justify-between items-center mb-10 border-b pb-6 ${presentationMode ? 'border-white/10' : 'border-slate-200'}`}>
                            <div className="mb-4 md:mb-0">
                                <h1 className="text-4xl font-black flex items-center gap-3">
                                    <Icon name="navigation" size={32} className="text-blue-600" />
                                    <span className={presentationMode ? "text-white" : "text-slate-900"}><span className="text-blue-600">PSO</span> Master</span>
                                </h1>
                                <p className="opacity-50 text-[10px] font-black uppercase tracking-widest mt-1">Gestión Inteligente de Infraestructuras</p>
                            </div>
                            <div className="flex gap-4 items-center">
                                <button onClick={() => setPresentationMode(!presentationMode)} className={`px-4 py-2 rounded-lg text-xs font-bold transition flex items-center gap-2 ${presentationMode ? 'bg-white/10 text-white border border-white/20' : 'bg-slate-200 text-slate-700'}`}>
                                    <Icon name={presentationMode ? "sun" : "moon"} size={16} />
                                    {presentationMode ? 'MODO LUZ' : 'MODO NOCHE'}
                                </button>
                                <button onClick={initMission} className={`p-3 rounded-xl transition ${presentationMode ? 'bg-white/5 border border-white/10 text-white' : 'bg-white border border-slate-200 text-slate-600'}`}>
                                    <Icon name="refresh-cw" size={20} />
                                </button>
                                <button onClick={runStep} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-black shadow-lg hover:scale-105 active:scale-95 transition flex items-center gap-2">
                                    ITERAR PASO {iteration + 1}
                                    <Icon name="chevron-right" size={20} />
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-12 gap-10">
                            {/* Ajustes */}
                            <div className={`col-span-12 lg:col-span-4 space-y-6 ${presentationMode ? 'opacity-80' : ''}`}>
                                <div className={`p-8 rounded-3xl shadow-xl border ${presentationMode ? 'bg-slate-800 border-white/10 text-white' : 'bg-white border-slate-200 text-slate-800'}`}>
                                    <h2 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-8 flex items-center gap-2">
                                        <Icon name="settings-2" size={16} /> Hiperparámetros
                                    </h2>
                                    <div className="space-y-10">
                                        {[
                                            { id: 'w', val: w, set: setW, label: 'Inercia (Inertia)', color: 'blue', icon: "wind", desc: 'Resistencia al cambio de dirección.' },
                                            { id: 'c1', val: c1, set: setC1, label: 'Cognitivo (Memory)', color: 'emerald', icon: "brain", desc: 'Atracción a su propio éxito (pBest).' },
                                            { id: 'c2', val: c2, set: setC2, label: 'Social (Group)', color: 'purple', icon: "users", desc: 'Atracción al líder del grupo (gBest).' }
                                        ].map(p => (
                                            <div key={p.id}>
                                                <div className="flex justify-between font-bold text-xs mb-3">
                                                    <span className="flex items-center gap-2"><Icon name={p.icon} size={14} className={`text-${p.color}-500`} /> {p.label}</span>
                                                    <span className={`text-${p.color}-500 font-mono text-lg`}>{p.val.toFixed(2)}</span>
                                                </div>
                                                <input type="range" min="0" max="2" step="0.1" value={p.val} onChange={(e) => p.set(parseFloat(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
                                                <p className="text-[10px] opacity-40 mt-2 italic">{p.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Mapa y Tabla */}
                            <div className="col-span-12 lg:col-span-8 space-y-10">
                                <div className={`${presentationMode ? 'bg-slate-800 border-white/10' : 'bg-white border-slate-200'} p-4 rounded-3xl border shadow-2xl flex flex-col items-center overflow-hidden transition-all duration-500`}>
                                    <div className="relative" style={{ width: MAP_SIZE, height: MAP_SIZE }}>
                                        <div className={`absolute inset-0 rounded-2xl ${presentationMode ? 'bg-slate-900/50' : 'bg-slate-50'}`} style={{ backgroundImage: presentationMode ? 'radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px)' : 'radial-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                                        
                                        {/* Objetivo */}
                                        <div className="absolute w-12 h-12 bg-orange-500/10 rounded-full animate-ping" style={{ left: TARGET.x-24, top: TARGET.y-24 }}></div>
                                        <div className="absolute text-orange-500" style={{ left: TARGET.x-12, top: TARGET.y-12 }}><Icon name="flame" size={24} /></div>
                                        
                                        <svg className="absolute inset-0 w-full h-full pointer-events-none overflow-visible">
                                            {drones.map(d => (
                                                <React.Fragment key={d.id}>
                                                    <line x1={d.x} y1={d.y} x2={gBest.x} y2={gBest.y} stroke={presentationMode ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.05)"} />
                                                    <line x1={d.x} y1={d.y} x2={d.nextX} y2={d.nextY} stroke={presentationMode ? "rgba(255,255,255,0.2)" : "rgba(150,150,150,0.3)"} strokeDasharray="4" />
                                                </React.Fragment>
                                            ))}
                                        </svg>

                                        {drones.map(d => (
                                            <div key={d.id} className="absolute w-6 h-6 rounded-full border-2 border-white shadow-xl flex items-center justify-center transition-all duration-500"
                                                style={{ left: d.x, top: d.y, backgroundColor: d.color, transform: 'translate(-50%, -50%)', zIndex: 10 }}>
                                                <span className="text-[9px] font-black text-white">{d.id}</span>
                                            </div>
                                        ))}
                                        <div className="absolute w-10 h-10 border-2 border-emerald-500/30 rounded-full flex items-center justify-center animate-pulse" style={{ left: gBest.x-20, top: gBest.y-20 }}>
                                            <Icon name="target" size={20} className="text-emerald-500" />
                                        </div>
                                    </div>
                                    <div className={`w-full mt-6 px-4 flex justify-between font-bold text-[10px] uppercase tracking-widest ${presentationMode ? 'text-slate-500' : 'text-slate-400'}`}>
                                        <span className="flex items-center gap-2"><Icon name="info" size={12} /> Status: {status}</span>
                                        <span className="text-blue-500">Error Global: {gBest.fitness.toFixed(4)}</span>
                                    </div>
                                </div>

                                <div className={`${presentationMode ? 'bg-slate-800 border-white/10' : 'bg-white border-slate-200'} rounded-3xl border shadow-xl overflow-hidden transition-all duration-500`}>
                                    <table className="w-full text-left text-[10px] font-mono">
                                        <thead className={`${presentationMode ? 'bg-white/5 text-slate-500' : 'bg-slate-50 text-slate-400'} uppercase`}>
                                            <tr>
                                                <th className="px-6 py-4">Drone</th>
                                                <th className="px-6 py-4">Posición Actual</th>
                                                <th className="px-6 py-4">pBest (Récord)</th>
                                                <th className="px-6 py-4 bg-blue-50/50 dark:bg-blue-900/10 text-blue-600">Próximo Punto</th>
                                                <th className="px-6 py-4 text-right">Fitness</th>
                                            </tr>
                                        </thead>
                                        <tbody className={`divide-y ${presentationMode ? 'divide-white/5' : 'divide-slate-100'}`}>
                                            {drones.map(d => (
                                                <tr key={d.id} className={`${presentationMode ? 'hover:bg-white/5' : 'hover:bg-slate-50'}`}>
                                                    <td className="px-6 py-3 font-bold flex items-center gap-2">
                                                        <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: d.color }}></div>
                                                        #{d.id}
                                                    </td>
                                                    <td className="px-6 py-3 opacity-50">{d.x.toFixed(0)}, {d.y.toFixed(0)}</td>
                                                    <td className="px-6 py-3 text-emerald-500">{d.pBestX.toFixed(0)}, {d.pBestY.toFixed(0)}</td>
                                                    <td className={`px-6 py-3 font-bold ${presentationMode ? 'text-blue-300' : 'text-blue-500'}`}>→ {d.nextX.toFixed(0)}, {d.nextY.toFixed(0)}</td>
                                                    <td className="px-6 py-3 text-right font-black">{d.pBestFitness.toFixed(1)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
